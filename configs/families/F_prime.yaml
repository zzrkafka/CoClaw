# Family F_prime -- transfer family. Same generator structure as F, but a different
# visible->hidden permutation (pi) and a different cheap forward cycle. Everything else
# matches F so the transfer test isolates "does the meta-skill survive a re-shuffle".
name: F_prime
K: 4
alpha: 1.0
beta: 5.0
sigma_z: 0.1
sigma_x: 0.1
eps_sigma: 0.05
cost_scale: 10000
pi: [1, 3, 0, 2]             # <- differs from F
cheap_cycle: [0, 2, 3, 1]   # <- differs from F
G_cheap: 0.1
G_exp: 1.0
